const cats=[...new Set(allData.map(d=>d.Category))].sort();

const targets=[...new Set(allData.map(d=>d['Target City']))].sort();

cats.forEach(c=>{

});
targets.forEach(c=>{

  document.getElementById('targetBtns').appendChild(btn);
});

function setIntent(val,btn){
  intentF=val;
  document.querySelectorAll('.intent-btn').forEach(b=>b.classList.remove('all-active','candidate-active','client-active','patient-active'));
  if(val==='all')btn.classList.add('all-active');
  else if(val==='Candidate')btn.classList.add('candidate-active');
  else if(val==='Client')btn.classList.add('client-active');
  else btn.classList.add('patient-active');
  render();
}

function sf(type,val,btn){
  if(type==='cat'){cf=val;document.querySelectorAll('#catBtns .fb').forEach(b=>b.classList.remove('active'));}
  else if(type==='from'){ff=val;document.querySelectorAll('#fromBtns .fb').forEach(b=>b.classList.remove('active'));}
  else{tf=val;document.querySelectorAll('#targetBtns .fb').forEach(b=>b.classList.remove('active'));}
  btn.classList.add('active');
  render();
}

function render(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const f=allData.filter(r=>
    (cf==='all'||r.Category===cf)&&
    (intentF==='all'||r.Intent===intentF)&&
    (ff==='all'||r['Searching From']===ff)&&
    (tf==='all'||r['Target City']===tf)&&
    (!q||r['Related Query'].includes(q)||r.Category.toLowerCase().includes(q))
  );

  // Sort filtered by volume descending within category
  f.sort((a,b)=>{
    if(a.Category < b.Category) return -1;
    if(a.Category > b.Category) return 1;
    return b.Volume - a.Volume;
  });

  const usedCities=[...new Set(f.map(r=>r['Searching From']).filter(c=>c!=='N/A'))];
  document.getElementById('legend').innerHTML=usedCities.map(c=>`

  `).join('');

  document.getElementById('cnt').textContent=`Showing ${f.length} of ${allData.length} keywords`;

    const intentClass=r.Intent==='Candidate'?'bc':'bk';
    const barColor=r.Intent==='Candidate'?'#B5D4F4':'#FAC775';

    if(r.Category!==lastCat){
      lastCat=r.Category;
      rank=0;
      html+=`<tr class="grp"><td colspan="6">${r.Category}</td></tr>`;
    }
    rank++;

      ?`<span class="na-watermark">Location unidentified</span>`

}
